<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doggos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message-content code {
            background-color: #f0f0f0;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
<div class="container mx-auto p-4 flex-1 flex flex-col">
    <h1 class="text-2xl font-bold mb-4 text-center text-gray-800">AI Doggos</h1>

    <!-- Mode selector -->
    <div class="flex gap-2 mb-4">
        <button id="btn-chat"
                onclick="setMode('chat')"
                class="px-6 py-2 rounded-lg font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 bg-blue-500 text-white">
            Chat
        </button>
        <button id="btn-dogs"
                onclick="setMode('dogs')"
                class="px-6 py-2 rounded-lg font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-700 border border-gray-300 hover:bg-gray-50">
            Dogs
        </button>
    </div>

    <div class="flex-1 overflow-y-auto mb-4 p-4 bg-white rounded-lg shadow">
        <div id="chat-messages" class="space-y-4"></div>
    </div>

    <form id="chat-form" class="flex items-center">
        <input
                type="text"
                id="message-input"
                name="message"
                placeholder="Type your message..."
                class="flex-1 p-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                required
        >
        <button
                type="submit"
                class="bg-blue-500 text-white px-4 py-2 rounded-r-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
            Send
        </button>
    </form>
</div>

<script>
    let currentMode = 'chat';

    function setMode(mode) {
        currentMode = mode;
        const btnChat = document.getElementById('btn-chat');
        const btnDogs = document.getElementById('btn-dogs');
        const activeClasses = ['bg-blue-500', 'text-white'];
        const inactiveClasses = ['bg-white', 'text-gray-700', 'border', 'border-gray-300', 'hover:bg-gray-50'];

        if (mode === 'chat') {
            btnChat.classList.add(...activeClasses);
            btnChat.classList.remove(...inactiveClasses);
            btnDogs.classList.remove(...activeClasses);
            btnDogs.classList.add(...inactiveClasses);
        } else {
            btnDogs.classList.add(...activeClasses);
            btnDogs.classList.remove(...inactiveClasses);
            btnChat.classList.remove(...activeClasses);
            btnChat.classList.add(...inactiveClasses);
        }
    }

    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const chatMessages = document.getElementById('chat-messages');

    chatForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;

        addMessageToChat('User', message);
        messageInput.value = '';

        try {
            if (currentMode === 'chat') {
                const response = await fetchStreamWithRetry('/chat-streaming?message=' + encodeURIComponent(message));
                const reader = response.body.getReader();
                const botMessageElement = addMessageToChat('Bot', '');
                const contentElement = botMessageElement.querySelector('.message-content');
                await processStream(reader, contentElement);
            } else {
                const response = await fetch('/dogs/recommendations?message=' + encodeURIComponent(message));
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const text = await response.text();
                addMessageToChat('Dogs', text);
            }
        } catch (error) {
            console.error('Error fetching response:', error);
            addMessageToChat('System', 'An error occurred while fetching the response. Please try again.');
        }
    });

    async function fetchStreamWithRetry(url, retries = 3) {
        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return response;
            } catch (e) {
                console.error(`Attempt ${i + 1} failed: ${e.message}`);
                if (i === retries - 1) throw e;
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
        }
    }

    async function processStream(reader, contentElement) {
        const decoder = new TextDecoder("utf-8");
        try {
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                contentElement.innerHTML += decoder.decode(value, { stream: true });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        } catch (error) {
            console.error('Error processing stream:', error);
            contentElement.innerHTML += '<br>[Error: Stream interrupted. Please try again.]';
        }
    }

    function addMessageToChat(sender, content) {
        const colors = {
            User: { bg: 'bg-blue-100', text: 'text-blue-600' },
            Bot:  { bg: 'bg-gray-100', text: 'text-green-600' },
            Dogs: { bg: 'bg-yellow-50', text: 'text-yellow-700' },
            System: { bg: 'bg-red-50', text: 'text-red-600' },
        };
        const c = colors[sender] || colors.Bot;
        const messageElement = document.createElement('div');
        messageElement.className = `${c.bg} p-3 rounded-lg`;
        messageElement.innerHTML = `
            <div class="font-bold ${c.text}">${sender}:</div>
            <div class="message-content">${content}</div>
        `;
        chatMessages.appendChild(messageElement);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return messageElement;
    }
</script>
</body>
</html>
